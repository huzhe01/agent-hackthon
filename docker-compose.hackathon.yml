# GrowEngine 智投星 Agent - 黑客松一键部署
#
# 使用方式：
#   cp .env.hackathon.example .env.hackathon
#   docker compose --env-file .env.hackathon -f docker-compose.hackathon.yml up -d --build

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: growengine-agent-backend
    env_file:
      - .env.hackathon
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      QIJI_BASE_URL: ${QIJI_BASE_URL:-https://api.openai-next.com/v1}
      QIJI_MODEL: ${QIJI_MODEL:-gpt-5}
      LLM_API_BASE: ${LLM_API_BASE:-https://api.openai-next.com/v1}
      LLM_MODEL: ${LLM_MODEL:-gpt-5}
    volumes:
      - growengine-backend-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - growengine-agent

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    container_name: growengine-agent-frontend
    ports:
      - "${APP_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - growengine-agent

networks:
  growengine-agent:
    driver: bridge

volumes:
  growengine-backend-data:
